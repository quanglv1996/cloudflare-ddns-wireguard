version: "3.8"

services:
  cloudflare-ddns:
    image: oznu/cloudflare-ddns
    container_name: cloudflare-ddns
    environment:
      API_KEY: YOUR_CLOUDFLARE_API_KEY
      ZONE: yourdomain.com
      SUBDOMAIN: vpn
      PROXIED: "false"
    restart: always

  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - SERVERURL=vpn.yourdomain.com
      - SERVERPORT=51820
      - PEERS=3
      - PEERDNS=8.8.8.8
    volumes:
      - ./wg-config:/config
      - /lib/modules:/lib/modules
    ports:
      - "51820:51820/udp"
    restart: unless-stopped